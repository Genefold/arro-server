services:
  arro-server:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    environment:
      ARRO_SERVER_DATA_ROOTS: "main=/data/zarr"
      ARRO_SERVER_ARROWSPACE_INDEX_STORE: "/index-store"
      ARRO_SERVER_INDEX_CACHE_SIZE: "8"

      # Deployment tier.
      # Set to 'production' to enforce CORS restriction, API key, and JSON logging.
      # In production this MUST be 'production'.
      ARRO_SERVER_ENV: "development"

      # CORS: set to your actual frontend origin(s) in production.
      # Example: ARRO_SERVER_CORS_ORIGINS=https://app.example.com
      # WARNING: '*' is rejected when ARRO_SERVER_ENV=production.
      ARRO_SERVER_CORS_ORIGINS: "*"

      ARRO_SERVER_LOG_LEVEL: "info"

      # Set to 'true' in production for structured JSON log lines.
      # Automatically forced to 'true' when ARRO_SERVER_ENV=production.
      ARRO_SERVER_LOG_JSON: "false"

      ARRO_SERVER_SERVE_FRONTEND: "true"

      # API key for write operations (POST /index, DELETE /index).
      # REQUIRED when ARRO_SERVER_ENV=production.
      # Generate a strong secret: openssl rand -hex 32
      # Clients must send:  X-API-Key: <value>
      ARRO_SERVER_API_KEY: ""

      # Rate limit for write endpoints. Uses limits library syntax.
      # Examples: '30/minute', '5/second', '' (empty = disabled).
      ARRO_SERVER_RATE_LIMIT_WRITE: "30/minute"

    volumes:
      # Zarr dataset root — mount your data here
      - zarr_data:/data/zarr
      # ArrowSpace index store — persisted across container restarts
      - arrow_index_store:/index-store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  zarr_data:
    driver: local
  arrow_index_store:
    driver: local
